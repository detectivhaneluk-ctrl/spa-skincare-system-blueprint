# DEPLOYMENT-REFERENCE-APACHE-MARKER-01 — paste into a production VirtualHost; replace paths and ServerName.
# DEPLOYMENT-REFERENCE-APACHE-ELITE-MARKER-01 — both DocumentRoot and Directory paths MUST end with /system/public (never repo root or system/ alone).
# Canonical docroot: …/your-clone/system/public (folder containing index.php + .htaccess with DEPLOYMENT-DOCROOT-PUBLIC-HTACCESS-MARKER-01).
#
# <VirtualHost *:443>
#     ServerName app.example.com
#     DocumentRoot "/var/www/spa/system/public"
#     <Directory "/var/www/spa/system/public">
#         AllowOverride All
#         Require all granted
#     </Directory>
# </VirtualHost>
#
# Do NOT set DocumentRoot to the repository root or to system/ — see system/docs/DEPLOYMENT-DOCROOT-EXPOSURE-HARDENING-01.md
