# Cheapest high-value checks on every PR (does not replace canonical release law).
#
# CI TOPOLOGY (CI-AND-REGRESSION-BREADTH-CLOSURE-01, 2026-04-01):
#   FAST GATE (this workflow, no DB required):
#     - PHP lint + composer validate/dump
#     - Case/path audit + architecture contracts + forbidden paths + changed-path policy
#     - Hotspot proof metadata
#     - PHPStan static analysis
#     - PHPUnit unit tests (pure value objects, no DB)
#     - All backbone domain guardrails (system/scripts/ci/guardrail_*.php)
#     - Key backbone verifier families (read-only, no DB)
#
#   DEEP GATE (tenant-isolation-gate.yml, DB-backed, on every push + PR):
#     - Canonical release law: migrate, seed, Tier A gate, Tier B smokes, db truth, zip artifact
#
#   SECURITY (security-guardrails.yml, on every push + PR):
#     - gitleaks, composer audit, dependency-review
#
name: PR fast guardrails

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-fast-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-fast-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Composer validate
        run: composer validate --strict --no-check-publish

      - name: Composer install (dev tools — PHPStan, PHPUnit)
        run: composer install --no-interaction --prefer-dist

      - name: Composer dump autoload (auditor + autoload consistency)
        run: composer dump-autoload -o -a --no-interaction

      - name: PHP lint changed files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mapfile -t files < <(git diff --name-only --diff-filter=ACDMRT "${BASE_SHA}" "${HEAD_SHA}" | grep -E '\.php$' || true)
          for f in "${files[@]}"; do
            [[ -f "$f" ]] || continue
            php -l "$f"
          done

      - name: Case/path audit (changed PHP under system/)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git diff --name-only --diff-filter=ACDMRT "${BASE_SHA}" "${HEAD_SHA}" | grep -E '^system/.*\.php$' > /tmp/pr-php-paths.txt || true
          if [[ -s /tmp/pr-php-paths.txt ]]; then
            php system/scripts/release/run_case_path_auditor.php --paths-file=/tmp/pr-php-paths.txt --json
          fi

      - name: Architecture contracts (core/module boundaries)
        run: php system/scripts/ci/verify_architecture_contracts.php

      - name: Forbidden tracked paths
        run: php system/scripts/ci/verify_forbidden_tracked_paths.php

      - name: Changed-path policy (diff vs base)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: php system/scripts/ci/verify_changed_paths_policy.php --base="${BASE_SHA}" --head="${HEAD_SHA}"

      - name: Hotspot proof metadata
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: php system/scripts/ci/verify_hotspot_proof_metadata.php --base="${BASE_SHA}" --head="${HEAD_SHA}"

      - name: PHPStan (scoped baseline)
        run: composer run phpstan

      - name: PHPUnit unit tests (no DB — pure kernel value objects)
        run: composer run test

      # -------------------------------------------------------------------
      # Backbone domain guardrails — all static, no DB required.
      # These enforce platform-wide architectural invariants on every PR.
      # -------------------------------------------------------------------

      - name: Guardrail — service layer DB ban
        run: php system/scripts/ci/guardrail_service_layer_db_ban.php

      - name: Guardrail — id-only repo API freeze
        run: php system/scripts/ci/guardrail_id_only_repo_api_freeze.php

      - name: Guardrail — async state machine ban
        run: php system/scripts/ci/guardrail_async_state_machine_ban.php

      - name: Guardrail — auth service authorizer enforcement
        run: php system/scripts/ci/guardrail_plt_auth_02_service_authorizer_enforcement.php

      - name: Guardrail — MFA privileged plane step-up
        run: php system/scripts/ci/guardrail_plt_mfa_01_privileged_plane_step_up.php

      - name: Guardrail — out-of-band lifecycle and worker integrity
        run: php system/scripts/ci/guardrail_out_of_band_integrity_and_worker_lifecycle_closure_01.php

      - name: Guardrail — critical integrity fail-closed boundary
        run: php system/scripts/ci/guardrail_critical_integrity_fail_closed_boundary_01.php

      - name: Guardrail — Wave 07 write-path replica ban
        run: php system/scripts/ci/guardrail_wave07_write_path_replica_ban.php

      - name: Guardrail — shard readiness organization_id
        run: php system/scripts/ci/guardrail_shard_readiness_organization_id.php

      - name: Guardrail — online DDL large table migrations
        run: php system/scripts/ci/guardrail_online_ddl_large_table_migrations.php

      # -------------------------------------------------------------------
      # Key backbone read-only verifier families — highest-risk invariants.
      # All static (no DB). Chosen for maximum blast-radius coverage.
      # Full 170+ verifier suite runs locally or on demand; only the highest-
      # value families are gated on every PR for speed.
      # -------------------------------------------------------------------

      - name: Verifier — background flow fail-closed (42 checks)
        run: php system/scripts/read-only/verify_background_flow_fail_closed_closure_01.php

      - name: Verifier — out-of-band integrity and worker lifecycle (25 checks)
        run: php system/scripts/read-only/verify_out_of_band_integrity_and_worker_lifecycle_closure_01.php

      - name: Verifier — kernel tenant context (74 checks)
        run: php system/scripts/read-only/verify_kernel_tenant_context_01.php

      - name: Verifier — auth enforcement wiring
        run: php system/scripts/read-only/verify_plt_auth_02_authorization_enforcement_wiring_01.php

      - name: Verifier — critical integrity fail-closed boundary
        run: php system/scripts/read-only/verify_critical_integrity_fail_closed_boundary_01.php
