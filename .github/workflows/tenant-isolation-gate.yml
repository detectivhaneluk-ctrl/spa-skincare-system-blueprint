# Canonical release law: Linux truth, Composer authoritative autoload, DB-backed proof, and final ZIP validation.
name: Canonical release law

on:
  push:
  pull_request:

jobs:
  canonical-release-law:
    runs-on: ubuntu-22.04
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: spa_release_law
          MYSQL_USER: spa
          MYSQL_PASSWORD: spa
        # Map container 3306 to a free host port (see job.services.mysql.ports[3306] in steps).
        ports:
          - 3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, zip
          tools: composer:v2
      - name: Prepare release-law environment
        env:
          MYSQL_SERVICE_PORT: ${{ job.services.mysql.ports['3306'] }}
        run: |
          mkdir -p distribution/release-law
          cp system/.env.example system/.env.local
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re
          path = Path("system/.env.local")
          text = path.read_text()
          port = os.environ["MYSQL_SERVICE_PORT"]
          replacements = {
              "APP_ENV": "local",
              "APP_DEBUG": "false",
              "DB_HOST": "127.0.0.1",
              "DB_PORT": port,
              "DB_DATABASE": "spa_release_law",
              "DB_USERNAME": "spa",
              "DB_PASSWORD": "spa",
          }
          for key, value in replacements.items():
              text = re.sub(rf"^{key}=.*$", f"{key}={value}", text, flags=re.MULTILINE)
          path.write_text(text)
          PY
      - name: Wait for MySQL on mapped host port
        env:
          MYSQL_SERVICE_PORT: ${{ job.services.mysql.ports['3306'] }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 45); do
            php -r '$p=(int)getenv("MYSQL_SERVICE_PORT"); $f = @fsockopen("127.0.0.1", $p); exit($f !== false ? 0 : 1);' && exit 0
            sleep 2
          done
          echo "MySQL did not accept TCP on 127.0.0.1:${MYSQL_SERVICE_PORT}"
          exit 1
      - name: Composer validate
        run: composer validate --strict --no-check-publish
      - name: Architecture + forbidden tracked paths
        run: |
          php system/scripts/ci/verify_architecture_contracts.php
          php system/scripts/ci/verify_forbidden_tracked_paths.php
      - name: Composer authoritative autoload
        run: composer dump-autoload -o -a --no-interaction
      - name: Exact case/path auditor
        run: php system/scripts/release/run_case_path_auditor.php --json | tee distribution/release-law/ci-case-path-audit.json
      - name: Canonical release law
        run: php system/scripts/release/run_canonical_release_law.php
      - name: Release-law report to job summary
        if: failure()
        run: |
          echo '## Canonical release law report' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat distribution/release-law/canonical-release-law-report.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload release-law reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-release-law-report
          path: |
            distribution/release-law
            distribution/*.zip
          if-no-files-found: warn
